server:
  host: "127.0.0.1"
  port: 18743
  admin_path: "/admin"
  auto_open_admin: true
  prefer_browser: "chrome"
  read_timeout: 15
  write_timeout: 120
  idle_timeout: 120
  admin_auth:
    enabled: true
    username: "admin"
    password: "ChangeMeNow!"


proxy:
  request_timeout: 120
  stream_timeout: 300
  max_retries: 2
  retry_delay_ms: 500

security:
  api_key_encryption: "aes-256-gcm"
  encryption_key_file: ".secret"
  cors_enabled: false
  allowed_origins: []

logging:
  level: "standard"
  retention_days: 30
  max_log_size_mb: 500
  log_prompts: false

database:
  path: "./data/localgateway.db"
  wal_mode: true
  auto_vacuum: true
  backup_interval: "24h"

routing:
  default_strategy: priority
  fallback:
    enabled: true
    max_retries: 2
    cooldown_seconds: 60
    retry_on:
      - rate_limit
      - server_error
      - timeout

providers: []
local_keys: []
